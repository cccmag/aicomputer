<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>資訊科技年鑑 1950-2025</title>
  <style>
    :root {
      --bg: #0f0f1a;
      --sidebar: #1a1a2e;
      --card: #16213e;
      --border: #2a2a4e;
      --text: #e0e0e0;
      --text-muted: #8a8a9a;
      --accent: #4E79A7;
      --accent2: #F28E2B;
      --accent3: #E15759;
      --accent4: #76B7B2;
      --accent5: #59A14F;
      --gold: #FFD700;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .hero {
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a3e 50%, #0f0f1a 100%);
      padding: 40px 20px 30px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .hero h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      color: var(--text-muted);
      margin-top: 8px;
    }

    .tabs {
      display: flex;
      gap: 4px;
      padding: 15px 20px;
      background: var(--sidebar);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      justify-content: center;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 10px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px 6px 0 0;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.3s;
      white-space: nowrap;
    }

    .tab-btn:hover {
      color: var(--text);
      background: var(--border);
    }

    .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .tab-content {
      display: none;
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .tab-content.active {
      display: block;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 25px;
      align-items: center;
    }

    .search-box {
      flex: 1;
      min-width: 220px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 10px 15px 10px 40px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .search-box::before {
      content: '🔍';
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
    }

    .filter-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 8px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.3s;
    }

    .filter-btn:hover, .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .decade-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 10px;
      margin-bottom: 25px;
    }

    .decade-btn {
      padding: 10px 15px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.3s;
      text-align: center;
    }

    .decade-btn:hover, .decade-btn.active {
      background: var(--accent2);
      border-color: var(--accent2);
      color: #000;
    }

    .timeline-section {
      margin-bottom: 30px;
    }

    .timeline-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .timeline-header h2 {
      font-size: 1.3rem;
    }

    .year-display {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
    }

    .timeline-slider-container {
      background: var(--card);
      border-radius: 10px;
      padding: 20px;
      border: 1px solid var(--border);
    }

    .timeline-track {
      position: relative;
      height: 50px;
      margin: 15px 0;
    }

    .timeline-line {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      transform: translateY(-50%);
    }

    .timeline-progress {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width 0.2s;
    }

    .timeline-input {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      transform: translateY(-50%);
      width: 100%;
      height: 30px;
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      cursor: pointer;
    }

    .timeline-input::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(78, 121, 167, 0.5);
    }

    .timeline-markers {
      display: flex;
      justify-content: space-between;
      padding: 0 3px;
    }

    .timeline-marker {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .year-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
    }

    .year-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      cursor: pointer;
      transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
    }

    .year-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .year-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
    }

    .year-card:hover::before { opacity: 1; }

    .year-card .year {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .year-card .title {
      font-size: 0.95rem;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .year-card .desc {
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .year-card .tags {
      display: flex;
      gap: 5px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .year-card .tag {
      font-size: 0.65rem;
      padding: 3px 7px;
      background: var(--sidebar);
      border-radius: 4px;
      color: var(--text-muted);
    }

    .year-card .turing-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 0.65rem;
      padding: 3px 8px;
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #000;
      border-radius: 20px;
      font-weight: 600;
    }

    .highlight-card {
      background: var(--sidebar);
      border-color: var(--gold);
    }

    .highlight-card::before {
      opacity: 1 !important;
      background: linear-gradient(90deg, var(--gold), var(--accent2)) !important;
    }

    .section-title {
      font-size: 1.3rem;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .turing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
    }

    .turing-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 15px;
      transition: transform 0.3s, border-color 0.3s;
    }

    .turing-card:hover {
      transform: translateY(-2px);
      border-color: var(--gold);
    }

    .turing-card .year {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--gold);
      margin-bottom: 5px;
    }

    .turing-card .name {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }

    .turing-card .name-en {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .turing-card .reason {
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 1000;
      padding: 20px;
      overflow-y: auto;
    }

    .modal-overlay.active {
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      max-width: 700px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      margin: 20px auto;
    }

    .modal-header {
      padding: 20px 25px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--card);
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 {
      font-size: 1.5rem;
      color: var(--accent);
    }

    .modal-close {
      width: 36px;
      height: 36px;
      background: var(--sidebar);
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--text);
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover { background: var(--accent3); }

    .modal-body {
      padding: 25px;
    }

    .modal-body p {
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .modal-body h3 {
      color: var(--accent2);
      margin: 15px 0 8px;
      font-size: 1.1rem;
    }

    .modal-body ul { margin-left: 18px; margin-bottom: 12px; }
    .modal-body li { line-height: 1.7; color: var(--text-muted); }
    .modal-body a { color: var(--accent); text-decoration: none; }
    .modal-body a:hover { text-decoration: underline; }

    .no-results {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 15px;
      text-align: center;
    }

    .stat-card .number {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-card .label {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    footer {
      text-align: center;
      padding: 30px 20px;
      color: var(--text-muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
      margin-top: 30px;
    }

    footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 768px) {
      .hero { padding: 30px 15px 20px; }
      .tabs { padding: 10px; justify-content: flex-start; }
      .tab-btn { padding: 8px 12px; font-size: 0.85rem; }
      .tab-content { padding: 15px; }
      .controls { flex-direction: column; }
      .year-cards { grid-template-columns: 1fr; }
      .turing-grid { grid-template-columns: 1fr; }
      .decade-grid { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>資訊科技年鑑</h1>
    <p>1950 - 2025 資訊科技發展史</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="timeline">時間軸</button>
    <button class="tab-btn" data-tab="browse">瀏覽全部</button>
    <button class="tab-btn" data-tab="turing">圖靈獎</button>
    <button class="tab-btn" data-tab="stats">統計資料</button>
  </div>

  <div id="tab-timeline" class="tab-content active">
    <div class="timeline-section">
      <div class="timeline-header">
        <h2>拖曳探索</h2>
        <div class="year-display" id="yearDisplay">2000</div>
      </div>
      <div class="timeline-slider-container">
        <div class="timeline-track">
          <div class="timeline-line"></div>
          <div class="timeline-progress" id="timelineProgress"></div>
          <input type="range" class="timeline-input" id="timelineSlider" min="1950" max="2025" value="2000">
        </div>
        <div class="timeline-markers">
          <span class="timeline-marker">1950</span>
          <span class="timeline-marker">1960</span>
          <span class="timeline-marker">1970</span>
          <span class="timeline-marker">1980</span>
          <span class="timeline-marker">1990</span>
          <span class="timeline-marker">2000</span>
          <span class="timeline-marker">2010</span>
          <span class="timeline-marker">2020</span>
          <span class="timeline-marker">2025</span>
        </div>
      </div>
    </div>
    <div id="modalPreview" class="year-cards"></div>
  </div>

  <div id="tab-browse" class="tab-content">
    <div class="controls">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜尋年份、關鍵字...">
      </div>
      <div class="filter-tabs">
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="hardware">硬體</button>
        <button class="filter-btn" data-filter="software">軟體</button>
        <button class="filter-btn" data-filter="network">網路</button>
        <button class="filter-btn" data-filter="turing">圖靈獎年</button>
      </div>
    </div>
    <div class="decade-grid">
      <button class="decade-btn" data-decade="1950">1950s</button>
      <button class="decade-btn" data-decade="1960">1960s</button>
      <button class="decade-btn" data-decade="1970">1970s</button>
      <button class="decade-btn" data-decade="1980">1980s</button>
      <button class="decade-btn" data-decade="1990">1990s</button>
      <button class="decade-btn" data-decade="2000">2000s</button>
      <button class="decade-btn" data-decade="2010">2010s</button>
      <button class="decade-btn" data-decade="2020">2020s</button>
    </div>
    <div id="yearGrid" class="year-cards"></div>
    <div id="noResults" class="no-results" style="display:none;">沒有找到符合條件的結果</div>
  </div>

  <div id="tab-turing" class="tab-content">
    <h2 class="section-title">🏆 圖靈獎得主 (1966-2025)</h2>
    <div id="turingGrid" class="turing-grid"></div>
  </div>

  <div id="tab-stats" class="tab-content">
    <div class="stats-bar">
      <div class="stat-card"><div class="number">76</div><div class="label">年份跨度</div></div>
      <div class="stat-card"><div class="number">1400+</div><div class="label">文章總數</div></div>
      <div class="stat-card"><div class="number">60</div><div class="label">圖靈獎得主</div></div>
      <div class="stat-card"><div class="number">5</div><div class="label">類別領域</div></div>
    </div>
    <h2 class="section-title">各年代重要發明</h2>
    <div class="turing-grid" id="statsGrid"></div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">2000 年</h2>
        <button class="modal-close" id="modalClose">×</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <footer>
    <p>資訊科技年鑑 | <a href="https://github.com/cccmag/aicomputer" target="_blank">GitHub</a> | 由 <a href="https://opencode.ai/" target="_blank">OpenCode</a> + AI 撰寫</p>
  </footer>

  <script>
    const yearData = {
      1950: { title: "圖靈測試與儲存程式電腦時代", highlights: ["圖靈測試概念提出", "SEAC 首部儲存程式電腦", "Whirlwind 即時計算系統", "ERA 1101 商業電腦"], category: "hardware", hasTuring: false, desc: "1950 年是現代計算的黎明時期。圖靈提出了著名的「圖靈測試」概念，為人工智慧奠定了思想基礎。" },

      1953: { title: "IBM 650 量產時代", highlights: ["IBM 650 大量生產", "EDVAC 正式完工", "IBM 701 開始出貨", "LEO I 商業服務"], category: "hardware", hasTuring: false, desc: "IBM 650 成為第一台大量生產的科學計算機，共售出超過 2000 台。" },

      1956: { title: "RAMAC 磁碟與達特茅斯會議", highlights: ["RAMAC 磁碟儲存系統", "TX-0 電晶體電腦", "達特茅斯 AI 會議", "FORTRAN 語言開發"], category: "hardware", hasTuring: false, desc: "IBM 發明 RAMAC，這是第一個硬碟儲存系統，開創了海量儲存的時代。" },
      1957: { title: "FORTRAN 發布與 Sputnik 危機", highlights: ["FORTRAN I 正式發布", "IBM 709 推出", "史普尼克衛星發射", "SHARE 用戶組織成立"], category: "software", hasTuring: false, desc: "FORTRAN I 的發布標誌著高階程式語言時代的來臨。" },
      1958: { title: "積體電路發明", highlights: ["積體電路發明", "ALGOL 58 程式語言", "LISP 語言萌芽", "Fairchild 半導體創立"], category: "hardware", hasTuring: false, desc: "積體電路的發明預示了半導體革命。Fairchild Semiconductor 的創立開啟了矽谷時代。" },

    let currentFilter = 'all';

    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tabId).classList.add('active');
      document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');
    }

    function renderYearCards(filter = 'all', decade = null, search = '') {
      const grid = document.getElementById('yearGrid');
      const noResults = document.getElementById('noResults');
      grid.innerHTML = '';

      let filtered = Object.entries(yearData);

      if (search) {
        const s = search.toLowerCase();
        filtered = filtered.filter(([year, data]) =>
          year.includes(s) || data.title.toLowerCase().includes(s) ||
          data.desc.toLowerCase().includes(s) ||
          data.highlights.some(h => h.toLowerCase().includes(s))
        );
      }

      if (decade) {
        const start = parseInt(decade);
        filtered = filtered.filter(([year]) => {
          const y = parseInt(year);
          return y >= start && y <= start + 9;
        });
      }

      if (filter !== 'all') {
        filtered = filtered.filter(([, data]) =>
          filter === 'turing' ? data.hasTuring : data.category === filter
        );
      }

      if (filtered.length === 0) {
        noResults.style.display = 'block';
        return;
      }
      noResults.style.display = 'none';

      filtered.forEach(([year, data]) => {
        const card = document.createElement('div');
        card.className = `year-card${data.hasTuring ? ' highlight-card' : ''}`;
        card.onclick = () => openModal(year);
        const tags = data.highlights.slice(0, 3).map(h =>
          `<span class="tag">${h.length > 15 ? h.substring(0, 15) + '...' : h}</span>`
        ).join('');
        card.innerHTML = `
          ${data.hasTuring ? `<span class="turing-badge">🏆 ${data.turingName}</span>` : ''}
          <div class="year">${year}</div>
          <div class="title">${data.title}</div>
          <div class="desc">${data.desc}</div>
          <div class="tags">${tags}</div>
        `;
        grid.appendChild(card);
      });
    }

      card.className = `year-card${data.hasTuring ? ' highlight-card' : ''}`;
      card.onclick = () => openModal(year);
      const tags = data.highlights.slice(0, 3).map(h =>
        `<span class="tag">${h.length > 15 ? h.substring(0, 15) + '...' : h}</span>`
      ).join('');
      card.innerHTML = `
        ${data.hasTuring ? `<span class="turing-badge">🏆 ${data.turingName}</span>` : ''}
        <div class="year">${year}</div>
        <div class="title">${data.title}</div>
        <div class="desc">${data.desc}</div>
        <div class="tags">${tags}</div>
      `;
      grid.appendChild(card);
    }

    function openModal(year) {
      const data = yearData[year];
      if (!data) return;
      const titles = articleTitles[year];
      document.getElementById('modalTitle').textContent = `${year} 年`;
      document.getElementById('modalBody').innerHTML = `
        <p><strong>主題：</strong>${data.title}</p>
        <p>${data.desc}</p>
        <h3>重要事件</h3>
        <ul>${data.highlights.map(h => `<li>${h}</li>`).join('')}</ul>
        <h3>相關文章</h3>
        ${titles ? `
        <p>前言：<a href="https://github.com/cccmag/aicomputer/blob/master/${year}/preface.md" target="_blank">${titles.preface}</a></p>
        <p>硬體：<a href="https://github.com/cccmag/aicomputer/blob/master/${year}/hardware1.md" target="_blank">${titles.hardware1}</a></p>
        <p>軟體：<a href="https://github.com/cccmag/aicomputer/blob/master/${year}/software1.md" target="_blank">${titles.software1}</a></p>
        <p>網路：<a href="https://github.com/cccmag/aicomputer/blob/master/${year}/network1.md" target="_blank">${titles.network1}</a></p>
        ${titles.turing ? `<p>圖靈獎：<a href="https://github.com/cccmag/aicomputer/blob/master/${year}/turing.md" target="_blank">${titles.turing}</a></p>` : ''}
        ` : ''}
      `;
      document.getElementById('modalOverlay').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    document.getElementById('searchInput').addEventListener('input', (e) => {
      renderYearCards(currentFilter, currentDecade, e.target.value);
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderYearCards(currentFilter, currentDecade, document.getElementById('searchInput').value);
      });
    });

    document.querySelectorAll('.decade-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const d = btn.dataset.decade;
        currentDecade = currentDecade === d ? null : d;
        btn.classList.toggle('active', currentDecade !== null);
        renderYearCards(currentFilter, currentDecade, document.getElementById('searchInput').value);
      });
    });

    document.getElementById('timelineSlider').addEventListener('input', (e) => {
      const year = e.target.value;
      updateTimeline(year);
      renderTimelinePreview(year);
    });

    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal();
    });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    renderYearCards();
    renderTuringWinners();
    renderStats();
    updateTimeline(2000);
    renderTimelinePreview(2000);
  </script>
</body>
</html>
